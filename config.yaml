# ============================================
# Job Auto Search 搜尋設定
# ============================================

search:
  # 搜尋關鍵字（CakeResume / LinkedIn 用；104 改用 job_categories）
  keywords:
    - "data analyst"
    - "business analyst"
    - "數據分析"
    - "資料分析"
    - "商業分析"

  # 搜尋地區
  areas:
    - "台北市"
    - "新北市"

  # 經驗年資範圍 [最低, 最高]（年）
  experience_range: [1, 5]

  # 最低薪資（月薪，0 表示不限）
  salary_min: 0

  # 工作類型: full_time, part_time, contract, all
  job_type: "full_time"

# 各平台設定
platforms:
  104:
    enabled: true
    max_pages: 15
    # 104 職缺類別碼 + 關鍵字組合（比純 keyword 精準 10x）
    # jobcat 縮小到相關分類，keyword 再過濾職稱
    job_searches:
      - jobcat: "2007001018"   # 數據分析師/資料分析師
        keyword: "analyst"
      - jobcat: "2007001018"
        keyword: "分析師"
      - jobcat: "2007001018"
        keyword: "intelligence"
  cakeresume:
    enabled: true
    max_pages: 3
  linkedin:
    enabled: true
    max_results: 30

# 輸出設定
output:
  csv_path: "results/jobs.csv"
  dashboard_path: "results/dashboard.html"
